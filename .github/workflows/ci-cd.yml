name: CI/CD - Pipeline

on:
  push:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Build Docker image
      - name: Build Image
        run: docker build -t devops-demo .

      # 3. Test container
      - name: Test Container
        run: |
          docker run -d -p 8080:80 --name test devops-demo
          sleep 5
          curl http://localhost:8080 | grep "Hello"
          docker rm -f test

      # 4. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user

            rm -rf demo-app
            git clone https://github.com/ujwalakula-p99soft/Devops-Demo.git
            cd demo-app

            docker rm -f nginx-container || true
            docker build -t nginx-devops-demo .
            docker run -d -p 80:80 --name nginx-container nginx-devops-demo