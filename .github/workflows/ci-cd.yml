name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Image
        run: docker build -t devops-demo .

      # 3. Run & Test container
      - name: Test Container
        run: |
          docker run -d -p 8080:80 --name test devops-demo

          echo "Waiting for container..."
          sleep 10

          echo "Checking HTTP response..."
          curl -f http://localhost:8080

          echo "Container logs:"
          docker logs test || true

          docker rm -f test

      # 4. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user

            echo "Cleaning old repo..."
            rm -rf demo-app

            echo "Cloning repo..."
            git clone https://github.com/ujwalakula-p99soft/Devops-Demo.git demo-app
            cd demo-app

            echo "Stopping old container..."
            docker rm -f nginx-container || true

            echo "Building new image..."
            docker build -t nginx-devops-demo .

            echo "Starting new container..."
            docker run -d -p 80:80 --name nginx-container nginx-devops-demo

            echo "Waiting for deployment..."
            sleep 10

            echo "Verifying deployment..."
            curl -f http://localhost

            echo "Deployment successful"