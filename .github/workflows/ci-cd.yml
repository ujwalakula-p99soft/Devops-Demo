name: CI/CD-Pipeline

on:
  push:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # Use v4 but suppress the node warning by telling GitHub it's okay to use Node 20 for now
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Build Image
        run: docker build -t devops-demo .

      - name: Test Container
        run: |
          docker run -d -p 8080:80 --name test devops-demo
          sleep 5
          curl -f http://localhost:8080 || exit 1
          docker rm -f test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          # We removed 'set -e' temporarily to see which specific command fails
          script: |
            cd /home/ec2-user
            sudo rm -rf demo-app
            git clone https://github.com demo-app
            cd demo-app
            sudo docker rm -f nginx-container || true
            sudo docker build -t nginx-devops-demo .
            sudo docker run -d -p 80:80 --name nginx-container nginx-devops-demo
